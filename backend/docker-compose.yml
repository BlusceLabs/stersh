version: "3.8"

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - VIDKING_EXTRACTOR_URL=http://extractor:8000
    depends_on:
      - extractor

  extractor:
    build:
      context: ./services/streaming
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
    volumes:
      - /app/data
