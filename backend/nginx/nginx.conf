worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"upstream_time":"$upstream_response_time"}';
    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/vnd.apple.mpegurl
        image/svg+xml;

    # ── Rate limit zones ──────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m     rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=source:10m  rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream watchfy_backend {
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL — replace with your certificates
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header Referrer-Policy           "strict-origin" always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Static frontend ─────────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── HLS manifest proxy (no-cache) ────────────────────────────────────
        location ~* /api/(vidking|proxy)/.*\.m3u8 {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://watchfy_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id;
            add_header Cache-Control           "no-cache, no-store" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── HLS segments (long-cache) ────────────────────────────────────────
        location ~* /api/(vidking|proxy)/seg/ {
            limit_req  zone=api   burst=200 nodelay;
            limit_conn conn 50;
            proxy_pass http://watchfy_backend;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header Range            $http_range;
            proxy_set_header If-Range         $http_if_range;
            proxy_buffering off;
            proxy_read_timeout 30s;
            add_header Cache-Control          "public, max-age=3600" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── Source extraction (rate-limited) ─────────────────────────────────
        location ~* /api/(vidking)/source {
            limit_req zone=source burst=5 nodelay;
            proxy_pass http://watchfy_backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 90s;          # Playwright can take up to 60 s
        }

        # ── Download / remux streams (no buffering) ───────────────────────────
        location ~* /api/(ffmpeg/remux|proxy/mp4) {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://watchfy_backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header Range           $http_range;
            proxy_buffering  off;
            proxy_read_timeout 600s;
        }

        # ── API (general) ─────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://watchfy_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection      "";
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID    $request_id;
            proxy_read_timeout 60s;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
        }

        # ── SPA fallback ──────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-store";
        }
    }
}