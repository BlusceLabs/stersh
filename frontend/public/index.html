<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>Watch!fy - Unlimited Movies, TV Shows &amp; Downloads</title>
    <meta name="description" content="Watch!fy - Stream unlimited movies, TV shows, and download your favorites. Ad-free streaming with high quality." />
    
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    
    <base href="/" />

    <!-- Performance & Preloading -->
    <link rel="preload" href="/app/bootstrap.ts" as="script" />
    
    <!-- Theme & PWA -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    
    <!-- Security -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Watch!fy - Unlimited Movies &amp; TV Shows" />
    <meta property="og:description" content="Stream the latest movies, TV series, and download content offline." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:site_name" content="Watch!fy" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Watch!fy - Unlimited Movies &amp; TV Shows" />
    <meta name="twitter:description" content="Stream the latest movies, TV series, and download content offline." />

    <script defer data-route="home" data-id="1"></script>
</head>
<body class="bg-black text-white antialiased">
    <div id="root"></div>
    
    <script defer src="/app/bootstrap.ts"></script>

    <!-- No JavaScript fallback -->
    <noscript>
        <div class="fixed inset-0 flex items-center justify-center bg-black text-white p-6 text-center">
            <div>
                <h1 class="text-2xl font-bold mb-4">JavaScript is required</h1>
                <p class="text-gray-400">Please enable JavaScript to experience Watch!fy.</p>
            </div>
        </div>
    </noscript>
</body>
</html>
