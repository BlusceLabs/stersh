name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-flight runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: Svelte type-check + Astro production build ──
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: svelte-check (Svelte + TS type diagnostics)
        run: npm run check

      - name: Astro production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  # ── Backend Python: compile-check + unit test suite ────────
  backend-python:
    name: Backend Python (compile + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-test.txt

      - name: Install test dependencies
        working-directory: ./backend
        run: pip install -r requirements-test.txt

      - name: Byte-compile every module (syntax check)
        working-directory: ./backend
        run: python3 -m compileall -q .

      - name: Run unit test suite
        working-directory: ./backend
        run: python3 -m unittest discover -s tests -v

  # ── Backend Go gateway: vet + build + test ─────────────────
  backend-go:
    name: Backend Go (vet + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/gateway
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/gateway/go.sum

      - name: go vet (static analysis)
        run: go vet ./...

      - name: go build (compilation check)
        run: go build ./...

      - name: go test (subtests)
        run: go test ./... -v
