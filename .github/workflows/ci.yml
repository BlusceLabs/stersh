name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-flight runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: Svelte type-check + Astro production build ──
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: svelte-check (Svelte + TS type diagnostics)
        run: npm run check

      - name: Astro production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  # ── Backend Python: compile-check + unit test suite ────────
  backend-python:
    name: Backend Python (compile + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-test.txt

      - name: Install test dependencies
        working-directory: ./backend
        run: pip install -r requirements-test.txt

      - name: Byte-compile every module (syntax check)
        working-directory: ./backend
        run: python3 -m compileall -q .

      - name: Run unit test suite
        working-directory: ./backend
        run: python3 -m unittest discover -s tests -v

  # ── Backend Go gateway: vet + build + test ─────────────────
  backend-go:
    name: Backend Go (vet + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/gateway
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/gateway/go.sum

      - name: go vet (static analysis)
        run: go vet ./...

      - name: go build (compilation check)
        run: go build ./...

      - name: go test (subtests)
        run: go test ./... -v

  # ── Dependency vulnerability scanning (advisory, not gating) ──
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Advisory only — does not block the build. Warns about
    # critical/high vulnerabilities so the team can plan upgrades.
    # `continue-on-error` is set per-step so a flaky scanner or a
    # single-language failure does not mask the others.
    steps:
      - uses: actions/checkout@v4

      - name: npm audit (frontend)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              const out = execSync('npm audit --json --audit-level=high', {
                cwd: 'frontend',
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'pipe'],
              });
              const parsed = JSON.parse(out);
              const meta = parsed.metadata?.vulnerabilities || {};
              const total = (meta.critical || 0) + (meta.high || 0);
              if (total > 0) {
                core.warning(`npm audit found ${meta.critical || 0} critical and ${meta.high || 0} high vulnerabilities`);
              } else {
                core.info('npm audit: no critical/high vulnerabilities');
              }
            } catch (err) {
              core.warning(`npm audit reported issues: ${err.message.split('\\n')[0]}`);
            }

      - name: pip-audit (backend)
        working-directory: ./backend
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict

      - name: govulncheck (go gateway)
        working-directory: ./backend/gateway
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ── Frontend end-to-end tests (Playwright) ──────────────────────
  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build the frontend (so the preview server reflects prod)
        run: npm run build

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
